<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de pedidos da lanchonete Good Hamburger — gerencie o cardápio e pedidos em tempo real." />
    <title>Good Hamburger — Sistema de Pedidos</title>
    <base href="/" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- App Styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="GoodHamburger.Web.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:#0f0f12;color:#94a3b8;font-family:Inter,sans-serif;">
            <span style="font-size:48px">🍔</span>
            <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f97316;border-radius:50%;animation:spin 0.8s linear infinite"></div>
            <span style="font-size:14px">A carregar Good Hamburger…</span>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;background:#ef4444;color:white;padding:12px 24px;font-size:14px;z-index:9999;">
        Ocorreu um erro inesperado.
        <a href="." style="color:white;font-weight:700;margin-left:8px">Recarregar</a>
        <span class="dismiss" style="float:right;cursor:pointer">✕</span>
    </div>
    <script>
        // Aplica o tema antes do Blazor renderizar para evitar flash
        (function () {
            var t = localStorage.getItem('gh-theme');
            if (t === 'light') document.body.className = 'light';
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
